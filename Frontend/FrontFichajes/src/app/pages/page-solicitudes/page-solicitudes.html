<div class="container mt-5">
    
    <div class="col-table">
        <p class="section-label">
            Solicitudes de cambio de horario
        </p>

        <div class="table-card">
            <table class="tabla">
                <thead>
                    <tr>
                        <th scope="col">Empleado</th>
                        <th scope="col">Motivo</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Fecha solicitud</th>
                    </tr>
                </thead>

                <tbody>
                    @if(solicitudes().length === 0) {
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">No hay solicitudes de cambio de horario</div>
                        </td> 
                    </tr>
                    }

                    @for(u of solicitudes(); track u.id) {
                    <tr>
                        <td class="td-nombre">{{ u.usuario?.nombre || 'Sin nombre' }}</td>
                        <td>{{ u.motivo}}</td>
                        <td>{{ u.estado }}</td>
                        <td>{{ formatFecha(u.fechaSolicitud) }}</td>                        
                            <td class="td-actions">
                            <button class="btn-edit" (click)="aprobar(u.id)" title="Aprobar">Aprobar</button>
                            <button class="btn-delete" (click)="rechazar(u.id)" title="Rechazar">Eliminar</button>
                        </td>
                    </tr>
                    }
                </tbody>

            </table>
</div>
