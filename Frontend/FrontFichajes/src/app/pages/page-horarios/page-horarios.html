<div class="page-wrapper">
  <div class="layout">
    <div class="col-form">
      <p class="section-label">GESTIÓN DE HORARIOS</p>

      <div class="card-glass">
        <p class="card-title">Nuevo <span class="accent">Horario</span></p>
        <p class="card-sub">Asigna turnos a los empleados</p>

        <div class="field">
          <label>Empleado</label>
          <select [(ngModel)]="nuevoHorario.usuarioId">
            <option value="">Seleccionar usuario</option>
            @for (u of usuarios; track u.id) {
              <option [value]="u.id">{{u.nombre}}</option>
            }
          </select>
        </div>

        <div class="field">
          <label>Día</label>
          <select [(ngModel)]="nuevoHorario.diaSemana">
            <option value="">Seleccionar día</option>
            @for (d of dias; track d) {
              <option [value]="d">{{d}}</option>
            }
          </select>
        </div>

        <div class="grid-2">
          <div>
            <label>Inicio</label>
            <input type="time" [(ngModel)]="nuevoHorario.horaInicio">
          </div>
          <div>
            <label>Fin</label>
            <input type="time" [(ngModel)]="nuevoHorario.horaFin">
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-secondary" (click)="nuevoHorario = {}">Limpiar</button>
          <button class="btn-primary" (click)="guardar()">Guardar →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="table-wrapper container-fluid mt-4">
    <div class="row">
      @for (grupo of horariosAgrupados; track grupo.empleado) {
        <div class="col-12 col-md-6">
          <app-tabla-horarios 
            [empleado]="grupo.empleado" 
            [turnos]="grupo.turnos" 
            (onEliminar)="eliminar($event)">
          </app-tabla-horarios>
        </div>
      } @empty {
        <div class="col-12 text-center text-muted py-5 card-glass">
          <p class="m-0">No hay horarios registrados</p>
        </div>
      }
    </div>
  </div>
</div>
